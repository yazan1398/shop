<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>سلة المشتريات</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .delete-btn {
            background: #dc3545;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 4px 12px;
            margin-right: 12px;
            cursor: pointer;
            font-size: 0.95em;
            transition: background 0.2s;
        }
        .delete-btn:hover {
            background: #b52a37;
        }
        /* ...existing code... */
.cart {
    background: #fff;
    padding: 24px;
    margin: 40px auto;
    width: 350px;
    border-radius: 12px;
    box-shadow: 0 4px 16px #ccc;
    text-align: center;
}
.cart h2 {
    margin-bottom: 20px;
    color: #222;
}
#cartList {
    list-style: none;
    padding: 0;
    margin-bottom: 20px;
}
#cartList li {
    background: #f1f1f1;
    margin-bottom: 10px;
    padding: 10px 0;
    border-radius: 6px;
    font-size: 1.1em;
    color: #333;
}
.checkout-btn {
    background: #007bff;
    color: #fff;
    border: none;
    padding: 12px 0;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    font-size: 1.1em;
    transition: background 0.2s;
}
.checkout-btn:hover {
    background: #0056b3;
}
.chat {
    margin: 40px auto;
    width: 350px;
    text-align: center;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 16px #ccc;
    padding: 24px;
}
.chat h2 {
    color: #222;
}
.chat a {
    display: inline-block;
    margin-top: 16px;
    font-size: 1.1em;
    text-decoration: none;
    color: #007bff;
    border: 1px solid #007bff;
    padding: 8px 18px;
    border-radius: 6px;
    transition: background 0.2s, color 0.2s;
}
.chat a:hover {
    background: #007bff;
    color: #fff;
}
/* ...existing code... */
    </style>
</head>
<body>
    <header>
        <a href="index.html" style="color:#fff;text-decoration:none;">&larr; العودة للمتجر</a>
        <h1>سلة المشتريات</h1>
    </header>
    <section class="cart" id="cartSection">
        <h2>منتجاتك</h2>
        <ul id="cartList"></ul>
        <button class="checkout-btn" onclick="goToDiscord()">الانتقال إلى الديسكورد</button>
    </section>
    <section class="chat" id="chatSection" style="display:none;">
        <h2>للتواصل معك </h2>
        <p>سيتم تحويلك إلى الديسكورد للتواصل ممك .</p>
        <a href="https://discord.gg/NeCzvvHjzr" target="_blank" style="color:#007bff;">اضغط هنا للانتقال إلى الديسكورد</a>
    </section>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        function updateCart() {
            const cartList = document.getElementById('cartList');
            cartList.innerHTML = '';
            if(cart.length === 0) {
                cartList.innerHTML = '<li>سلتك فارغة</li>';
            } else {
                cart.forEach((item, idx) => {
                    const li = document.createElement('li');
                    li.textContent = item.name;
                    // زر حذف
                    const delBtn = document.createElement('button');
                    delBtn.textContent = 'حذف';
                    delBtn.className = 'delete-btn';
                    delBtn.onclick = function() {
                        removeFromCart(idx);
                    };
                    li.appendChild(delBtn);
                    cartList.appendChild(li);
                });
            }
        }
        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCart();
        }
        function goToDiscord() {
            document.getElementById('cartSection').style.display = 'none';
            document.getElementById('chatSection').style.display = 'block';
        }
        updateCart();
    </script>
</body>
</html>
